<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة تحكم الإعلانات - Admin</title>
  <style>
   /* Reset */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

/* Body */
body {
    font-family: "Segoe UI", Tahoma, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e1b4b);
    min-height: 100vh;
    color: #e2e8f0;
}

/* Container */
.container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 30px 20px;
}

/* Header */
.admin-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
    flex-wrap: wrap;
    gap: 15px;
}

.admin-header h1 {
    font-size: 26px;
    display: flex;
    align-items: center;
    gap: 12px;
}

/* Back Button */
.back-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 10px;
    color: #fff;
    text-decoration: none;
    transition: all 0.3s;
}

.back-btn:hover {
    background: rgba(255, 255, 255, 0.2);
}

/* Stats */
.stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 15px;
    margin-bottom: 30px;
}

.stat-card {
    background: rgba(255, 255, 255, 0.05);
    border-radius: 16px;
    padding: 20px;
    text-align: center;
    border: 1px solid rgba(255, 255, 255, 0.1);
}

.stat-card.total {
    border-bottom: 3px solid #3b82f6;
}

.stat-card.active {
    border-bottom: 3px solid #22c55e;
}

.stat-card.inactive {
    border-bottom: 3px solid #ef4444;
}

.stat-num {
    font-size: 32px;
    font-weight: bold;
    display: block;
}

.stat-label {
    font-size: 13px;
    color: #94a3b8;
    margin-top: 5px;
}

/* Add Button */
.add-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    border: none;
    border-radius: 14px;
    color: #fff;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    margin-bottom: 25px;
    transition: all 0.3s;
}

.add-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(59, 130, 246, 0.4);
}

/* Ads List */
.ads-list {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

/* Ad Item */
.ad-item {
    display: flex;
    align-items: center;
    gap: 15px;
    padding: 15px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 16px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    transition: all 0.3s;
}

.ad-item:hover {
    background: rgba(255, 255, 255, 0.08);
}

/* Ad Thumbnail */
.ad-thumb {
    width: 80px;
    height: 80px;
    border-radius: 12px;
    object-fit: cover;
    flex-shrink: 0;
    background: rgba(255, 255, 255, 0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    overflow: hidden;
    position: relative;
}

.ad-thumb img,
.ad-thumb video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.ad-thumb .type-badge {
    position: absolute;
    bottom: 4px;
    right: 4px;
    background: rgba(0, 0, 0, 0.7);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 10px;
}

/* Ad Info */
.ad-info {
    flex: 1;
    min-width: 0;
}

.ad-info h3 {
    font-size: 15px;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.ad-info p {
    font-size: 12px;
    color: #94a3b8;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.ad-info .ad-type {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    margin-top: 5px;
}

.ad-info .ad-type.image {
    background: rgba(59, 130, 246, 0.2);
    color: #60a5fa;
}

.ad-info .ad-type.video {
    background: rgba(239, 68, 68, 0.2);
    color: #f87171;
}

.ad-info .ad-type.text {
    background: rgba(34, 197, 94, 0.2);
    color: #4ade80;
}

/* Status */
.status {
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: bold;
}

.status.on {
    background: rgba(34, 197, 94, 0.2);
    color: #22c55e;
}

.status.off {
    background: rgba(239, 68, 68, 0.2);
    color: #ef4444;
}

/* Actions */
.actions {
    display: flex;
    gap: 6px;
}

.act-btn {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-size: 16px;
    transition: all 0.3s;
}

.act-btn:hover {
    transform: scale(1.1);
}

.act-btn.toggle {
    background: rgba(34, 197, 94, 0.2);
    color: #22c55e;
}

.act-btn.toggle.off {
    background: rgba(156, 163, 175, 0.2);
    color: #9ca3af;
}

.act-btn.edit {
    background: rgba(59, 130, 246, 0.2);
    color: #3b82f6;
}

.act-btn.delete {
    background: rgba(239, 68, 68, 0.2);
    color: #ef4444;
}

/* Empty State */
.empty {
    text-align: center;
    padding: 60px;
    color: #64748b;
}
   /* ===== Modal ===== */
.modal {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.9);
    backdrop-filter: blur(10px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 20px;
    overflow-y: auto;
}

.modal.show {
    display: flex;
}

.modal-box {
    background: linear-gradient(145deg, #1e293b, #0f172a);
    border-radius: 20px;
    width: 100%;
    max-width: 550px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    margin: auto;
}

.modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 22px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
}

.modal-header h2 {
    font-size: 18px;
}

.close-btn {
    width: 34px;
    height: 34px;
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.1);
    border: none;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
}

.modal-body {
    padding: 22px;
    max-height: 65vh;
    overflow-y: auto;
}

/* ===== Form Group ===== */
.form-group {
    margin-bottom: 18px;
}

.form-group label {
    display: block;
    margin-bottom: 8px;
    font-size: 13px;
    color: #94a3b8;
}

.form-group input,
.form-group textarea {
    width: 100%;
    padding: 12px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 10px;
    color: #fff;
    font-size: 14px;
    outline: none;
}

.form-group input:focus,
.form-group textarea:focus {
    border-color: #3b82f6;
}

.form-group textarea {
    min-height: 70px;
    resize: vertical;
}

/* ===== Type Selector ===== */
.type-selector {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 18px;
}

.type-btn {
    padding: 14px 10px;
    border-radius: 12px;
    border: 2px solid rgba(255, 255, 255, 0.1);
    background: rgba(255, 255, 255, 0.03);
    color: #94a3b8;
    cursor: pointer;
    text-align: center;
    transition: all 0.3s;
}

.type-btn:hover {
    border-color: rgba(255, 255, 255, 0.3);
}

.type-btn.sel {
    border-color: #3b82f6;
    background: rgba(59, 130, 246, 0.15);
    color: #fff;
}

.type-btn span {
    display: block;
    font-size: 24px;
    margin-bottom: 5px;
}

.type-btn small {
    font-size: 12px;
}

/* ===== Upload Area ===== */
.upload-area {
    border: 2px dashed rgba(255, 255, 255, 0.2);
    border-radius: 12px;
    padding: 25px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    margin-bottom: 15px;
}

.upload-area:hover {
    border-color: #3b82f6;
    background: rgba(59, 130, 246, 0.05);
}

.upload-area.dragover {
    border-color: #22c55e;
    background: rgba(34, 197, 94, 0.1);
}

.upload-area input {
    display: none;
}

.upload-area .icon {
    font-size: 40px;
    margin-bottom: 10px;
}

.upload-area p {
    color: #94a3b8;
    font-size: 13px;
}

.upload-area small {
    color: #64748b;
    font-size: 11px;
}

.preview-media {
    max-width: 100%;
    max-height: 200px;
    border-radius: 10px;
    margin-top: 15px;
    display: none;
}

.preview-media.show {
    display: block;
}

.remove-media {
    display: none;
    margin-top: 10px;
    padding: 8px 16px;
    background: rgba(239, 68, 68, 0.2);
    border: none;
    border-radius: 8px;
    color: #f87171;
    cursor: pointer;
    font-size: 13px;
}

.remove-media.show {
    display: inline-block;
}

/* ===== Pickers ===== */
.picker {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}

.pick-btn {
    width: 42px;
    height: 42px;
    border-radius: 10px;
    border: 2px solid transparent;
    cursor: pointer;
    font-size: 20px;
    background: rgba(255, 255, 255, 0.1);
    transition: all 0.2s;
}

.pick-btn:hover {
    transform: scale(1.1);
}

.pick-btn.sel {
    border-color: #fff;
    box-shadow: 0 0 12px rgba(255, 255, 255, 0.3);
}

/* ===== Switch ===== */
.switch-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.switch {
    width: 48px;
    height: 24px;
    background: #475569;
    border-radius: 12px;
    position: relative;
    cursor: pointer;
    transition: all 0.3s;
}

.switch::after {
    content: '';
    position: absolute;
    width: 20px;
    height: 20px;
    background: #fff;
    border-radius: 50%;
    top: 2px;
    right: 2px;
    transition: all 0.3s;
}

.switch.on {
    background: #22c55e;
}

.switch.on::after {
    right: 26px;
}

/* ===== Preview Card ===== */
.preview-card {
    padding: 20px;
    border-radius: 14px;
    text-align: center;
    margin-top: 10px;
}

.preview-card .emoji {
    font-size: 36px;
    display: block;
    margin-bottom: 8px;
}

.preview-card h4 {
    color: #fff;
    margin-bottom: 4px;
    font-size: 15px;
}

.preview-card p {
    color: rgba(255, 255, 255, 0.8);
    font-size: 13px;
}

.preview-card img,
.preview-card video {
    max-width: 100%;
    max-height: 150px;
    border-radius: 10px;
    margin-bottom: 10px;
}

/* ===== Modal Footer ===== */
.modal-footer {
    display: flex;
    gap: 12px;
    padding: 18px 22px;
    border-top: 1px solid rgba(255, 255, 255, 0.1);
}

.modal-footer button {
    flex: 1;
    padding: 13px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s;
}

.cancel-btn {
    background: rgba(255, 255, 255, 0.1);
    border: none;
    color: #fff;
}

.save-btn {
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    border: none;
    color: #fff;
}

.save-btn:hover {
    transform: translateY(-2px);
}

/* ===== Responsive ===== */
@media (max-width: 600px) {
    .ad-item {
        flex-wrap: wrap;
    }

    .ad-thumb {
        width: 60px;
        height: 60px;
    }

    .actions {
        width: 100%;
        justify-content: flex-end;
        margin-top: 10px;
    }

    .type-selector {
        grid-template-columns: 1fr;
    }
}
  </style>
</head>
<body>
  <div class="container">
    <div class="admin-header">
      <h1>🎛️ لوحة تحكم الإعلانات</h1>
      <a href="index.html" class="back-btn">← العودة للموقع</a>
    </div>
    <div class="stats">
      <div class="stat-card total"><span class="stat-num" id="total">0</span><span class="stat-label">إجمالي الإعلانات</span></div>
      <div class="stat-card active"><span class="stat-num" id="active">0</span><span class="stat-label">نشطة</span></div>
      <div class="stat-card inactive"><span class="stat-num" id="inactive">0</span><span class="stat-label">متوقفة</span></div>
    </div>
    <button class="add-btn" onclick="openModal()">➕ إضافة إعلان جديد</button>
    <div class="ads-list" id="adsList"></div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="modalTitle">إضافة إعلان جديد</h2>
        <button class="close-btn" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <label style="font-size:13px;color:#94a3b8;margin-bottom:10px;display:block;">نوع الإعلان</label>
        <div class="type-selector">
          <div class="type-btn sel" data-type="text" onclick="selectType('text')"><span>📝</span><small>نص فقط</small></div>
          <div class="type-btn" data-type="image" onclick="selectType('image')"><span>🖼️</span><small>صورة</small></div>
          <div class="type-btn" data-type="video" onclick="selectType('video')"><span>🎬</span><small>فيديو</small></div>
        </div>

        <div id="mediaUpload" style="display:none;">
          <div class="upload-area" id="uploadArea">
            <input type="file" id="fileInput" accept="image/*,video/*">
            <div class="icon" id="uploadIcon">📁</div>
            <p id="uploadText">اضغط أو اسحب الملف هنا</p>
            <small id="uploadHint">صور: JPG, PNG, GIF | فيديو: MP4, WebM</small>
          </div>
          <img id="previewImg" class="preview-media">
          <video id="previewVid" class="preview-media" controls></video>
          <button class="remove-media" id="removeMedia" onclick="removeMedia()">🗑️ إزالة الملف</button>
        </div>

        <div class="form-group"><label>عنوان الإعلان *</label><input type="text" id="adTitle" placeholder="مثال: خصم 50%"></div>
        <div class="form-group"><label>الوصف</label><textarea id="adDesc" placeholder="وصف مختصر"></textarea></div>
        
        <div id="textOptions">
          <div class="form-group"><label>اختر أيقونة</label><div class="picker" id="emojiPicker"></div></div>
          <div class="form-group"><label>اختر لون</label><div class="picker" id="colorPicker"></div></div>
        </div>

        <div class="form-group"><div class="switch-row"><label style="color:#94a3b8;font-size:13px;">نشط فور الإضافة</label><div class="switch on" id="activeSwitch" onclick="toggleSwitch()"></div></div></div>
        <div class="form-group"><label>معاينة</label><div class="preview-card" id="preview"><span class="emoji">📢</span><h4>عنوان الإعلان</h4><p>وصف الإعلان</p></div></div>
      </div>
      <div class="modal-footer">
        <button class="cancel-btn" onclick="closeModal()">إلغاء</button>
        <button class="save-btn" onclick="saveAd()">💾 حفظ</button>
      </div>
    </div>
  </div>

  <script>
    const emojis = ['📢','🎉','✨','🚚','💰','🔥','⭐','🎁','💎','🚗','💥','🏷️'];
    const colors = ['#ef4444','#f97316','#eab308','#22c55e','#14b8a6','#3b82f6','#8b5cf6','#ec4899'];
    
    let ads = JSON.parse(localStorage.getItem('siteAds') || '[]');
    let editId = null, selEmoji = '📢', selColor = '#3b82f6', isActive = true;
    let adType = 'text', mediaData = null;

    if (ads.length === 0) {
      ads = [
        { id: 1, type: 'text', title: 'خصم 50% على جميع السيارات', desc: 'عرض لفترة محدودة', emoji: '🎉', color: '#ef4444', active: true },
        { id: 2, type: 'text', title: 'تشكيلة موديلات 2025', desc: 'اكتشف الجديد', emoji: '✨', color: '#3b82f6', active: true },
      ];
      save();
    }
    function saveAd() {
        saveAdsToServer();

  const title = document.getElementById("adTitle").value.trim();
  const desc = document.getElementById("adDesc").value.trim();

  if (!title) return alert("يجب كتابة عنوان الإعلان");

  const newAd = {
    id: editId ? editId : Date.now(),
    type: adType,
    title,
    desc,
    emoji: adType === 'text' ? selEmoji : null,
    color: adType === 'text' ? selColor : null,
    media: adType !== 'text' ? mediaData : null,
    active: isActive
  };

  if (editId) {
    ads = ads.map(a => a.id === editId ? newAd : a);
  } else {
    ads.push(newAd);
  }

  saveAdsToServer(); // حفظ في السيرفر
  closeModal();
  render();
}


    function save() { localStorage.setItem('siteAds', JSON.stringify(ads)); }

    function render() {
      const list = document.getElementById('adsList');
      document.getElementById('total').textContent = ads.length;
      document.getElementById('active').textContent = ads.filter(a => a.active).length;
      document.getElementById('inactive').textContent = ads.filter(a => !a.active).length;

      if (!ads.length) { list.innerHTML = '<div class="empty">لا توجد إعلانات</div>'; return; }

      list.innerHTML = ads.map(ad => `
        <div class="ad-item">
          <div class="ad-thumb" style="${ad.type === 'text' ? `background:linear-gradient(135deg,${ad.color}dd,${ad.color}99)` : ''}">
            ${ad.type === 'text' ? ad.emoji : ''}
            ${ad.type === 'image' ? `<img src="${ad.media}">` : ''}
            ${ad.type === 'video' ? `<video src="${ad.media}" muted></video><span class="type-badge">▶</span>` : ''}
          </div>
          <div class="ad-info">
            <h3>${ad.title}</h3>
            <p>${ad.desc || 'بدون وصف'}</p>
            <span class="ad-type ${ad.type}">${ad.type === 'text' ? '📝 نص' : ad.type === 'image' ? '🖼️ صورة' : '🎬 فيديو'}</span>
          </div>
          <span class="status ${ad.active ? 'on' : 'off'}">${ad.active ? 'نشط' : 'متوقف'}</span>
          <div class="actions">
            <button class="act-btn toggle ${ad.active ? '' : 'off'}" onclick="toggle(${ad.id})">👁️</button>
            <button class="act-btn edit" onclick="edit(${ad.id})">✏️</button>
            <button class="act-btn delete" onclick="del(${ad.id})">🗑️</button>
          </div>
        </div>
      `).join('');
    }

    function selectType(t) {
      adType = t;
      document.querySelectorAll('.type-btn').forEach(b => b.classList.toggle('sel', b.dataset.type === t));
      document.getElementById('mediaUpload').style.display = t !== 'text' ? 'block' : 'none';
      document.getElementById('textOptions').style.display = t === 'text' ? 'block' : 'none';
      document.getElementById('uploadIcon').textContent = t === 'image' ? '🖼️' : '🎬';
      document.getElementById('uploadText').textContent = t === 'image' ? 'اضغط لرفع صورة' : 'اضغط لرفع فيديو';
      document.getElementById('fileInput').accept = t === 'image' ? 'image/*' : 'video/*';
      updatePreview();
    }

    function initPickers() {
      document.getElementById('emojiPicker').innerHTML = emojis.map(e => `<button type="button" class="pick-btn ${e===selEmoji?'sel':''}" onclick="pickEmoji('${e}')">${e}</button>`).join('');
      document.getElementById('colorPicker').innerHTML = colors.map(c => `<button type="button" class="pick-btn ${c===selColor?'sel':''}" style="background:${c}" onclick="pickColor('${c}')"></button>`).join('');
    }

    function pickEmoji(e) { selEmoji = e; initPickers(); updatePreview(); }
    function pickColor(c) { selColor = c; initPickers(); updatePreview(); }
    function toggleSwitch() { isActive = !isActive; document.getElementById('activeSwitch').classList.toggle('on', isActive); }

    function updatePreview() {
      const title = document.getElementById('adTitle').value || 'عنوان الإعلان';
      const desc = document.getElementById('adDesc').value || 'وصف الإعلان';
      const prev = document.getElementById('preview');
      
      let html = '';
      if (adType === 'text') {
        prev.style.background = `linear-gradient(135deg,${selColor}dd,${selColor}99)`;
        html = `<span class="emoji">${selEmoji}</span><h4>${title}</h4><p>${desc}</p>`;
      } else if (adType === 'image' && mediaData) {
        prev.style.background = 'rgba(255,255,255,0.05)';
        html = `<img src="${mediaData}" style="max-width:100%;max-height:120px;border-radius:8px;margin-bottom:8px;"><h4>${title}</h4><p>${desc}</p>`;
      } else if (adType === 'video' && mediaData) {
        prev.style.background = 'rgba(255,255,255,0.05)';
        html = `<video src="${mediaData}" style="max-width:100%;max-height:120px;border-radius:8px;margin-bottom:8px;" muted></video><h4>${title}</h4><p>${desc}</p>`;
      } else {
        prev.style.background = 'rgba(255,255,255,0.05)';
        html = `<span class="emoji">${adType === 'image' ? '🖼️' : '🎬'}</span><h4>${title}</h4><p>${desc}</p>`;
      }
      prev.innerHTML = html;
    }

    // File Upload
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    
    uploadArea.onclick = () => fileInput.click();
    uploadArea.ondragover = e => { e.preventDefault(); uploadArea.classList.add('dragover'); };
    uploadArea.ondragleave = () => uploadArea.classList.remove('dragover');
    uploadArea.ondrop = e => { e.preventDefault(); uploadArea.classList.remove('dragover'); handleFile(e.dataTransfer.files[0]); };
    fileInput.onchange = e => handleFile(e.target.files[0]);

    function handleFile(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        mediaData = e.target.result;
        const isImg = file.type.startsWith('image');
        document.getElementById('previewImg').src = isImg ? mediaData : '';
        document.getElementById('previewImg').classList.toggle('show', isImg);
        document.getElementById('previewVid').src = !isImg ? mediaData : '';
        document.getElementById('previewVid').classList.toggle('show', !isImg);
        document.getElementById('removeMedia').classList.add('show');
        updatePreview();
      };
      reader.readAsDataURL(file);
    }

    function removeMedia() {
      mediaData = null;
      fileInput.value = '';
      document.getElementById('previewImg').classList.remove('show');
      document.getElementById('previewVid').classList.remove('show');
      document.getElementById('removeMedia').classList.remove('show');
      updatePreview();
    }

    function openModal(id = null) {
      editId = id;
      document.getElementById('modalTitle').textContent = id ? 'تعديل الإعلان' : 'إضافة إعلان جديد';
      
      if (id) {
        const ad = ads.find(a => a.id === id);
        document.getElementById('adTitle').value = ad.title;
        document.getElementById('adDesc').value = ad.desc;
        selEmoji = ad.emoji || '📢';
        selColor = ad.color || '#3b82f6';
        isActive = ad.active;
        adType = ad.type || 'text';
        mediaData = ad.media || null;
      } else {
        document.getElementById('adTitle').value = '';
        document.getElementById('adDesc').value = '';
        selEmoji = '📢'; selColor = '#3b82f6'; isActive = true; adType = 'text'; mediaData = null;
      }
      
      selectType(adType);
      if (mediaData) {
        if (adType === 'image') { document.getElementById('previewImg').src = mediaData; document.getElementById('previewImg').classList.add('show'); }
        if (adType === 'video') { document.getElementById('previewVid').src = mediaData; document.getElementById('previewVid').classList.add('show'); }
        document.getElementById('removeMedia').classList.add('show');
      } else { removeMedia(); }
      
      document.getElementById('activeSwitch').classList.toggle('on', isActive);
      initPickers();
      updatePreview();
      document.getElementById('modal').classList.add('show');
    }

    function closeModal() { document.getElementById('modal').classList.remove('show'); editId = null; removeMedia(); }

  

async function saveAdsToServer() {
  await fetch("save_ads.php", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(ads)
  });
}

function addNewAd(ad) {
  ads.push(ad);
  saveAdsToServer();
}

function updateAds() {
  saveAdsToServer();
}



    function toggle(id) { const ad = ads.find(a => a.id === id); ad.active = !ad.active; save(); render(); }
    function edit(id) { openModal(id); }
    function del(id) { if (confirm('حذف هذا الإعلان؟')) { ads = ads.filter(a => a.id !== id); save(); render(); } }

    document.getElementById('adTitle').oninput = updatePreview;
    document.getElementById('adDesc').oninput = updatePreview;
    render();
  </script>
</body>
